<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function () {
        try {
            if (localStorage.getItem("als-theme") === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        } catch (e) {}
    })();
    </script>
    <meta name="i18n-title" content="sales.docTitle">
    <title>Satışlar - Mertory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="css/design.css" rel="stylesheet">
</head>
<body>

    <a href="#main" class="skip-link" data-i18n="skip.link">İçeriğe geç</a>

    <header class="site-header">
        <div class="site-header__inner">
            <a href="index.html" class="brand">
                <svg class="brand-mark" width="36" height="26" viewBox="0 0 36 26" aria-hidden="true">
                    <ellipse class="brand-mark-oval" cx="18" cy="13" rx="16" ry="11"></ellipse>
                    <text class="brand-mark-text" x="18" y="17" text-anchor="middle">M</text>
                </svg>
                Mertory
            </a>
            <nav class="site-nav" aria-label="Ana gezinme">
                <a href="index.html" data-i18n="nav.home">Ana Sayfa</a>
                <a href="parts.html" data-i18n="nav.parts">Parçalar</a>
                <a href="sales.html" aria-current="page" data-i18n="nav.sales">Satışlar</a>
                <a href="customers.html" data-i18n="nav.customers">Müşteriler</a>
                <a href="reports.html" data-i18n="nav.reports">Raporlar</a>
                <a href="settings.html" data-i18n="nav.settings">Ayarlar</a>
            </nav>
            <div class="lang-switch">
                <button type="button" class="lang-trigger" aria-haspopup="true" aria-expanded="false" aria-controls="langMenu" aria-label="Dil / Language / Sprache">
                    <span class="lang-trigger-label">TR</span>
                    <svg class="lang-trigger-caret" width="10" height="6" viewBox="0 0 10 6" aria-hidden="true">
                        <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div id="langMenu" class="lang-menu" aria-label="Dil / Language / Sprache">
                    <button type="button" class="lang-menu-item" data-lang-option="tr" aria-current="true">
                        <span>Türkçe</span>
                        <svg class="lang-menu-check" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                            <path d="M2 7l3.5 3.5L12 3.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button type="button" class="lang-menu-item" data-lang-option="en">
                        <span>English</span>
                        <svg class="lang-menu-check" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                            <path d="M2 7l3.5 3.5L12 3.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button type="button" class="lang-menu-item" data-lang-option="de">
                        <span>Deutsch</span>
                        <svg class="lang-menu-check" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                            <path d="M2 7l3.5 3.5L12 3.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main id="main" class="page">
        <div class="page-header">
            <h1 class="page-title" data-i18n="sales.title">Satışlar</h1>
            <button type="button" class="btn btn-primary" id="newSaleBtn" data-i18n="sales.newBtn">+ Yeni Satış</button>
        </div>

        <div id="errorBanner" class="banner banner-danger" role="alert" hidden>
            <span id="errorBannerText"></span>
            <button type="button" class="btn btn-sm btn-ghost" id="errorRetryBtn" data-i18n="common.retry">Tekrar dene</button>
        </div>

        <div class="toolbar">
            <label class="toolbar-checkbox">
                <input type="checkbox" id="pendingCoreFilter">
                <span data-i18n="sales.toolbar.pendingCoreOnly">Sadece bekleyen korlar</span>
            </label>
        </div>

        <div class="table-wrap">
            <table class="table" id="salesTable">
                <thead>
                    <tr>
                        <th data-i18n="sales.table.date">Tarih</th>
                        <th data-i18n="sales.table.part">Parça</th>
                        <th data-i18n="sales.table.customer">Müşteri</th>
                        <th class="num" data-i18n="sales.table.quantity">Adet</th>
                        <th class="num" data-i18n="sales.table.amount">Tutar</th>
                        <th data-i18n="sales.table.core">Kor</th>
                        <th data-i18n="sales.table.note">Not</th>
                        <th class="actions"><span class="visually-hidden" data-i18n="sales.table.actions">İşlem</span></th>
                    </tr>
                </thead>
                <tbody id="salesTableBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state" hidden>
                <p class="empty-state-title" id="emptyStateTitle" data-i18n="sales.empty.title">Henüz satış kaydı yok</p>
                <p id="emptyStateBody">İlk satışını kaydederek başla.</p>
                <a href="parts.html" class="btn btn-primary" id="emptyStateLink" data-i18n="sales.empty.goToParts" hidden>Parçalara Git</a>
                <button type="button" class="btn btn-primary" id="emptyStateBtn" data-i18n="sales.empty.newBtn">+ Yeni Satış</button>
            </div>
        </div>
    </main>

    <dialog class="dialog" id="saleDialog" aria-labelledby="dialogTitle">
        <form id="saleForm" novalidate>
            <div class="dialog-header">
                <h2 id="dialogTitle" data-i18n="sales.dialog.newTitle">Yeni Satış</h2>
                <button type="button" class="dialog-close" id="dialogCloseBtn" data-i18n-aria-label="common.close" aria-label="Kapat">✕</button>
            </div>
            <div class="dialog-body">
                <div class="field">
                    <label class="field-label" for="salePart" data-i18n="sales.dialog.part">Parça *</label>
                    <select class="select" id="salePart" required aria-describedby="salePartError"></select>
                    <p class="field-error" id="salePartError"></p>
                </div>

                <div class="field">
                    <label class="field-label" for="saleCustomer" data-i18n="sales.dialog.customer">Müşteri (opsiyonel)</label>
                    <select class="select" id="saleCustomer">
                        <option value="" data-i18n="sales.dialog.customerNone">— Seçilmedi —</option>
                    </select>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="saleQuantity" data-i18n="sales.dialog.quantity">Adet</label>
                        <input type="number" class="input" id="saleQuantity" value="1" min="1" step="1" aria-describedby="stockWarning">
                    </div>
                    <div class="field">
                        <label class="field-label" for="saleSoldPrice" data-i18n="sales.dialog.price">Satış Fiyatı (€) *</label>
                        <input type="number" class="input" id="saleSoldPrice" step="0.01" min="0" aria-describedby="salePriceError">
                        <p class="field-error" id="salePriceError"></p>
                    </div>
                </div>
                <p class="field-error" id="stockWarning"></p>

                <div class="field" id="coreReturnedField" hidden>
                    <label class="checkbox-field">
                        <input type="checkbox" id="saleCoreReturned">
                        <span class="checkbox-field-label" data-i18n="sales.dialog.coreReturned">Eski parça (kor) alındı mı?</span>
                    </label>
                </div>

                <div class="field">
                    <label class="field-label" for="saleNote" data-i18n="sales.dialog.note">Not</label>
                    <input type="text" class="input" id="saleNote">
                </div>

                <div class="total-line">
                    <span class="total-line-label" data-i18n="sales.dialog.totalLabel">Toplam</span>
                    <span class="total-line-value" id="saleTotalValue">€0.00</span>
                </div>
                <p class="total-line-note" id="saleTotalNote"></p>
            </div>
            <div class="dialog-actions">
                <button type="button" class="btn btn-ghost" id="dialogCancelBtn" data-i18n="common.cancel">İptal</button>
                <button type="submit" class="btn btn-primary" id="dialogSaveBtn" data-i18n="common.save">Kaydet</button>
            </div>
        </form>
    </dialog>

    <dialog class="dialog" id="confirmDialog" aria-labelledby="confirmTitle">
        <div class="dialog-header">
            <h2 id="confirmTitle" data-i18n="common.confirmTitle">Emin misiniz?</h2>
        </div>
        <div class="dialog-body" id="confirmMessage"></div>
        <div class="dialog-actions">
            <button type="button" class="btn btn-ghost" id="confirmCancelBtn" data-i18n="common.cancel">İptal</button>
            <button type="button" class="btn btn-danger" id="confirmOkBtn" data-i18n="common.delete">Sil</button>
        </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sales.js"></script>
</body>
</html>
