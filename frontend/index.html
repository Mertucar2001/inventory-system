<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function () {
        try {
            if (localStorage.getItem("als-theme") === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        } catch (e) {}
    })();
    </script>
    <meta name="i18n-title" content="home.docTitle">
    <title>Mertory | Atölye Yönetim Sistemi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="css/design.css" rel="stylesheet">
</head>
<body>

    <a href="#main" class="skip-link" data-i18n="skip.link">İçeriğe geç</a>

    <header class="site-header">
        <div class="site-header__inner">
            <a href="index.html" class="brand">
                <svg class="brand-mark" width="36" height="26" viewBox="0 0 36 26" aria-hidden="true">
                    <ellipse class="brand-mark-oval" cx="18" cy="13" rx="16" ry="11"></ellipse>
                    <text class="brand-mark-text" x="18" y="17" text-anchor="middle">M</text>
                </svg>
                Mertory
            </a>
            <nav class="site-nav" aria-label="Ana gezinme">
                <a href="index.html" aria-current="page" data-i18n="nav.home">Ana Sayfa</a>

            </nav>
            <div class="lang-switch">
                <button type="button" class="lang-trigger" aria-haspopup="true" aria-expanded="false" aria-controls="langMenu" aria-label="Dil / Language / Sprache">
                    <span class="lang-trigger-label">TR</span>
                    <svg class="lang-trigger-caret" width="10" height="6" viewBox="0 0 10 6" aria-hidden="true">
                        <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div id="langMenu" class="lang-menu" aria-label="Dil / Language / Sprache">
                    <button type="button" class="lang-menu-item" data-lang-option="tr" aria-current="true">
                        <span>Türkçe</span>
                        <svg class="lang-menu-check" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                            <path d="M2 7l3.5 3.5L12 3.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button type="button" class="lang-menu-item" data-lang-option="en">
                        <span>English</span>
                        <svg class="lang-menu-check" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                            <path d="M2 7l3.5 3.5L12 3.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button type="button" class="lang-menu-item" data-lang-option="de">
                        <span>Deutsch</span>
                        <svg class="lang-menu-check" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                            <path d="M2 7l3.5 3.5L12 3.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

        <div class="page-header">
            <h1 class="page-title" data-i18n="home.title">Ana Sayfa</h1>
        </div>

        <div id="errorBanner" class="banner banner-danger" role="alert" hidden>
            <span id="errorBannerText"></span>
            <button type="button" class="btn btn-sm btn-ghost" id="errorRetryBtn" data-i18n="common.retry">Tekrar dene</button>
        </div>

        <div class="home-list">
            <a href="parts.html" class="home-row">
                <div>
                    <div class="home-row-title" data-i18n="home.partsRowTitle">Parçalar</div>
                    <div class="home-row-stat" id="partsStat" data-i18n="home.loading">Yükleniyor…</div>
                </div>
                <span class="home-row-arrow" aria-hidden="true">→</span>
            </a>

            <a href="sales.html" class="home-row">
                <div>
                    <div class="home-row-title" data-i18n="home.salesRowTitle">Satışlar</div>
                    <div class="home-row-stat" id="salesStat" data-i18n="home.loading">Yükleniyor…</div>
                </div>
                <span class="home-row-arrow" aria-hidden="true">→</span>
            </a>

            <a href="customers.html" class="home-row">

                </div>
                <span class="home-row-arrow" aria-hidden="true">→</span>

    <script src="js/i18n.js"></script>
